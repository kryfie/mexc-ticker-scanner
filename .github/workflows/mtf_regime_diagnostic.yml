name: MTF Regime Fixed Tickers

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    # ============================================================
    # TUTAJ ZMIENIAJ TICKERY I PARAMETRY TESTU
    # Symbole MEXC zapisujemy jako NAZWA_USDT.
    # ============================================================
    env:
      SYMBOLS: >-
        BTC_USDT
        ETH_USDT
        SPX_USDT
        SOL_USDT
        SUI_USDT
        BRETT_USDT
        RENDER_USDT
        IOTA_USDT
        PYTH_USDT
        FOLKS_USDT
        BEAT_USDT
        AGT_USDT
        RIF_USDT
        RESOLV_USDT
        EGLD_USDT
        FLOCK_USDT
        BCH_USDT
        VELVET_USDT
        M_USDT
        SKYAI_USDT
        POL_USDT
        VTHO_USDT
        OPENAI_USDT

      DAYS: "30"
      RR: "2.0"
      COMMISSION_PERCENT: "0.06"
      SLIPPAGE_TICKS: "1"
      SAME_CANDLE_POLICY: "conservative"

      # true  = zamknięcie po utracie reżimu M15
      # false = wyłącznie SL albo TP
      EXIT_ON_REGIME_LOSS: "true"

      # Dodatkowe parametry strategii
      MIN_REGIME_STRENGTH: "68.0"
      MIN_REGIME_ER: "0.20"
      MIN_REGIME_SLOPE_ATR: "0.08"
      MAX_REGIME_STRETCH_ATR: "2.50"
      PULLBACK_VALID_BARS: "4"
      MIN_RANGE_EXPANSION: "1.10"
      MIN_BODY_RATIO: "0.55"
      MAX_ENTRY_STRETCH_ATR: "0.80"
      MIN_STOP_ATR: "0.25"
      MAX_STOP_ATR: "2.00"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fixed-ticker MTF scanner
        shell: bash
        run: |
          set -euo pipefail

          read -r -a SYMBOL_ARRAY <<< "$SYMBOLS"

          ARGS=(
            --symbols "${SYMBOL_ARRAY[@]}"
            --days "$DAYS"
            --warmup-days 7
            --rr "$RR"
            --commission-percent "$COMMISSION_PERCENT"
            --slippage-ticks "$SLIPPAGE_TICKS"
            --same-candle-policy "$SAME_CANDLE_POLICY"
            --min-regime-strength "$MIN_REGIME_STRENGTH"
            --min-regime-er "$MIN_REGIME_ER"
            --min-regime-slope-atr "$MIN_REGIME_SLOPE_ATR"
            --max-regime-stretch-atr "$MAX_REGIME_STRETCH_ATR"
            --pullback-valid-bars "$PULLBACK_VALID_BARS"
            --min-range-expansion "$MIN_RANGE_EXPANSION"
            --min-body-ratio "$MIN_BODY_RATIO"
            --max-entry-stretch-atr "$MAX_ENTRY_STRETCH_ATR"
            --min-stop-atr "$MIN_STOP_ATR"
            --max-stop-atr "$MAX_STOP_ATR"
            --ranking-output ranking_mtf.csv
            --trades-output trades_mtf.csv
            --rejected-output rejected_setups.csv
            --equity-output equity_curve_mtf.csv
            --open-output open_trades_mtf.csv
            --config-output run_config.json
          )

          if [[ "$EXIT_ON_REGIME_LOSS" == "true" ]]; then
            ARGS+=(--exit-on-regime-loss)
          else
            ARGS+=(--no-regime-exit)
          fi

          echo "Scanning symbols:"
          printf '  %s\n' "${SYMBOL_ARRAY[@]}"

          python -u mtf_regime_diagnostic.py "${ARGS[@]}"

      - name: Validate generated files
        run: |
          set -e
          test -s ranking_mtf.csv
          test -s trades_mtf.csv
          test -s rejected_setups.csv
          test -s equity_curve_mtf.csv
          test -s open_trades_mtf.csv
          test -s run_config.json

          echo "==== ranking_mtf.csv ===="
          head -30 ranking_mtf.csv

          echo "==== trades_mtf.csv ===="
          head -10 trades_mtf.csv

      - name: Add run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MTF Regime — fixed ticker test"
            echo ""
            echo "- Days: \`$DAYS\`"
            echo "- RR: \`$RR\`"
            echo "- Regime exit: \`$EXIT_ON_REGIME_LOSS\`"
            echo "- Same-candle policy: \`$SAME_CANDLE_POLICY\`"
            echo ""
            echo "### Tickers"
            echo '```text'
            printf '%s\n' $SYMBOLS
            echo '```'
            echo ""
            if [[ -f ranking_mtf.csv ]]; then
              echo "### Ranking"
              echo '```csv'
              head -25 ranking_mtf.csv
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scanner outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mtf-fixed-tickers-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: error
          path: |
            ranking_mtf.csv
            trades_mtf.csv
            rejected_setups.csv
            equity_curve_mtf.csv
            open_trades_mtf.csv
            run_config.json
