name: MTF v7 Multi-Variant Test — 30D

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    # ============================================================
    # TUTAJ ZMIENIAJ TICKERY I PODSTAWOWE PARAMETRY.
    # BEAT_USDT celowo pominięty.
    # Skrypt w repozytorium ma zachować nazwę mtf_regime_diagnostic.py.
    # ============================================================
    env:
      SYMBOLS: >-
        BTC_USDT
        ETH_USDT
        SPX_USDT
        SOL_USDT
        SUI_USDT
        BRETT_USDT
        RENDER_USDT
        IOTA_USDT
        PYTH_USDT
        FOLKS_USDT
        AGT_USDT
        RIF_USDT
        RESOLV_USDT
        EGLD_USDT
        FLOCK_USDT
        BCH_USDT
        VELVET_USDT
        M_USDT
        SKYAI_USDT
        POL_USDT
        VTHO_USDT
        OPENAI_USDT

      DAYS: "30"
      RR: "3.0"
      COMMISSION_PERCENT: "0.06"
      SLIPPAGE_TICKS: "1"
      SAME_CANDLE_POLICY: "conservative"
      OUTPUT_PREFIX: "v7_variants"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check repository files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah
          test -f mtf_regime_diagnostic.py || {
            echo "::error::Brakuje mtf_regime_diagnostic.py w głównym katalogu repozytorium."
            exit 1
          }
          test -f requirements.txt || {
            echo "::error::Brakuje requirements.txt w głównym katalogu repozytorium."
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scanner
        run: |
          python -m py_compile mtf_regime_diagnostic.py
          python mtf_regime_diagnostic.py --help

      - name: Run ten strategy variants
        shell: bash
        run: |
          set -euo pipefail
          read -r -a SYMBOL_ARRAY <<< "$SYMBOLS"

          python -u mtf_regime_diagnostic.py \
            --symbols "${SYMBOL_ARRAY[@]}" \
            --days "$DAYS" \
            --warmup-days 7 \
            --rr "$RR" \
            --commission-percent "$COMMISSION_PERCENT" \
            --slippage-ticks "$SLIPPAGE_TICKS" \
            --same-candle-policy "$SAME_CANDLE_POLICY" \
            --output-prefix "$OUTPUT_PREFIX"

      - name: Validate outputs
        shell: bash
        run: |
          set -euo pipefail
          FILES=(
            v7_variants_scorecard.csv
            v7_variants_period_summary.csv
            v7_variants_ticker_summary.csv
            v7_variants_trades.csv
            v7_variants_rejections.csv
            v7_variants_equity.csv
            v7_variants_open.csv
            v7_variants_errors.csv
            v7_variants_config.json
          )
          for file in "${FILES[@]}"; do
            test -f "$file" || {
              echo "::error::Nie utworzono $file"
              exit 1
            }
          done

          echo "==== SCORECARD ===="
          cat v7_variants_scorecard.csv

      - name: Add run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MTF v7 — multi-variant 30-day test"
            echo ""
            echo "- Days: \`$DAYS\`"
            echo "- RR: \`$RR\`"
            echo "- Variants: baseline, isolated filters, all filters, LONG/SHORT only, BE and lock"
            echo ""
            if [[ -f v7_variants_scorecard.csv ]]; then
              echo "### Scorecard"
              echo '```csv'
              head -35 v7_variants_scorecard.csv
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mtf-v7-variants-30d-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            v7_variants_scorecard.csv
            v7_variants_period_summary.csv
            v7_variants_ticker_summary.csv
            v7_variants_trades.csv
            v7_variants_rejections.csv
            v7_variants_equity.csv
            v7_variants_open.csv
            v7_variants_errors.csv
            v7_variants_config.json
