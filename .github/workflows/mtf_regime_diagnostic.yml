name: MTF v8 Robust Test — 3x30D

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    # ============================================================
    # JEDEN SKAN:
    # - 90 dni danych
    # - 3 niezależne okna po 30 dni
    # - główny kandydat: Range + Volume + Depth
    # - BEAT_USDT celowo pominięty
    #
    # Skrypt w repozytorium zachowuje starą nazwę:
    # mtf_regime_diagnostic.py
    # ============================================================
    env:
      SYMBOLS: >-
        BTC_USDT
        ETH_USDT
        SPX_USDT
        SOL_USDT
        SUI_USDT
        BRETT_USDT
        RENDER_USDT
        IOTA_USDT
        PYTH_USDT
        FOLKS_USDT
        AGT_USDT
        RIF_USDT
        RESOLV_USDT
        EGLD_USDT
        FLOCK_USDT
        BCH_USDT
        VELVET_USDT
        M_USDT
        SKYAI_USDT
        POL_USDT
        VTHO_USDT
        OPENAI_USDT

      WINDOW_DAYS: "30"
      WINDOW_COUNT: "3"
      WARMUP_DAYS: "7"

      RR: "3.0"
      COMMISSION_PERCENT: "0.06"
      SLIPPAGE_TICKS: "1"
      SAME_CANDLE_POLICY: "conservative"
      OUTPUT_PREFIX: "v8_robust"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check repository files
        shell: bash
        run: |
          set -euo pipefail
          ls -lah

          test -f mtf_regime_diagnostic.py || {
            echo "::error::Brakuje mtf_regime_diagnostic.py w głównym katalogu repozytorium."
            exit 1
          }

          test -f requirements.txt || {
            echo "::error::Brakuje requirements.txt w głównym katalogu repozytorium."
            exit 1
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate scanner
        run: |
          python -m py_compile mtf_regime_diagnostic.py
          python mtf_regime_diagnostic.py --help

      - name: Run robust multi-window scanner
        shell: bash
        run: |
          set -euo pipefail
          read -r -a SYMBOL_ARRAY <<< "$SYMBOLS"

          echo "Tickers: ${#SYMBOL_ARRAY[@]}"
          echo "Windows: ${WINDOW_COUNT} x ${WINDOW_DAYS} days"

          python -u mtf_regime_diagnostic.py \
            --symbols "${SYMBOL_ARRAY[@]}" \
            --window-days "$WINDOW_DAYS" \
            --window-count "$WINDOW_COUNT" \
            --warmup-days "$WARMUP_DAYS" \
            --rr "$RR" \
            --commission-percent "$COMMISSION_PERCENT" \
            --slippage-ticks "$SLIPPAGE_TICKS" \
            --same-candle-policy "$SAME_CANDLE_POLICY" \
            --output-prefix "$OUTPUT_PREFIX"

      - name: Validate outputs
        shell: bash
        run: |
          set -euo pipefail

          FILES=(
            v8_robust_scorecard.csv
            v8_robust_window_summary.csv
            v8_robust_ticker_summary.csv
            v8_robust_trades.csv
            v8_robust_rejections.csv
            v8_robust_equity.csv
            v8_robust_open.csv
            v8_robust_primary_leave_one_ticker_out.csv
            v8_robust_errors.csv
            v8_robust_config.json
          )

          for file in "${FILES[@]}"; do
            test -f "$file" || {
              echo "::error::Nie utworzono $file"
              exit 1
            }
          done

          echo "==== PRIMARY CANDIDATE: C_RVD_CORE ===="
          head -1 v8_robust_scorecard.csv
          grep '^C_RVD_CORE,' v8_robust_scorecard.csv || true

          echo "==== FULL SCORECARD ===="
          cat v8_robust_scorecard.csv

          echo "==== LEAVE ONE TICKER OUT ===="
          cat v8_robust_primary_leave_one_ticker_out.csv

      - name: Add run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## MTF v8 — robust 3x30-day test"
            echo ""
            echo "- Windows: \`${WINDOW_COUNT} x ${WINDOW_DAYS} days\`"
            echo "- RR: \`$RR\`"
            echo "- Primary: \`C_RVD_CORE\`"
            echo "- Primary filters: M1 range >= 1.10, M5 volume <= 0.90, M5 depth <= 1.70 ATR"
            echo ""
            if [[ -f v8_robust_scorecard.csv ]]; then
              echo "### Primary candidate"
              echo '```csv'
              head -1 v8_robust_scorecard.csv
              grep '^C_RVD_CORE,' v8_robust_scorecard.csv || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mtf-v8-robust-3x30d-${{ github.run_id }}
          retention-days: 30
          if-no-files-found: warn
          path: |
            v8_robust_scorecard.csv
            v8_robust_window_summary.csv
            v8_robust_ticker_summary.csv
            v8_robust_trades.csv
            v8_robust_rejections.csv
            v8_robust_equity.csv
            v8_robust_open.csv
            v8_robust_primary_leave_one_ticker_out.csv
            v8_robust_errors.csv
            v8_robust_config.json
