name: MEXC Scalping Scan

on:
  workflow_dispatch:
    inputs:
      interval:
        description: "MEXC interval: Min1, Min5, Min15, Min30, Min60, Hour4, Day1"
        required: true
        default: "Min1"
      days:
        description: "How many recent days to analyze"
        required: true
        default: "7"
      min_trades:
        description: "Minimum closed trades to include in ranking"
        required: true
        default: "1"
      min_symbol_leverage:
        description: "Only scan tickers with max leverage at least this value"
        required: true
        default: "100"
  schedule:
    # Co godzine. GitHub Actions moze miec opoznienia.
    - cron: "0 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        run: |
          python scalp_scan_mexc.py \
            --interval "${{ github.event.inputs.interval || 'Min1' }}" \
            --days "${{ github.event.inputs.days || '7' }}" \
            --min-trades "${{ github.event.inputs.min_trades || '1' }}" \
            --min-symbol-leverage "${{ github.event.inputs.min_symbol_leverage || '100' }}" \
            --out-dir reports

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: scalp-reports
          path: reports/
          retention-days: 14
