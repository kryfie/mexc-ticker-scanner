name: M_USDT Pine Verification RAW Debug

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days to scan"
        required: true
        default: "30"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run M_USDT M1 and M5 verification
        run: |
          python -u mexc_scanner_multi_parallel_debug.py             --symbols M_USDT             --days "${{ github.event.inputs.days }}"             --intervals "Min1,Min5"             --tp-r-values "5"             --max-sl1-roi-values "50"             --min-closed-trades "0"             --leverage "50"             --starting-capital "5"             --margin-multiplier "10"             --taker-fee "0.0008"             --cooldown "0"             --max-workers "2"             --ranking-all ranking_all.csv             --ranking-best ranking_best_per_ticker.csv             --parameter-summary parameter_summary.csv             --debug-output trades_debug.csv             --signals-debug-output signals_debug.csv

      - name: Show verification files
        if: always()
        run: |
          ls -lah
          echo "===== ranking_all.csv ====="
          cat ranking_all.csv || true
          echo "===== signals_debug.csv (first 50 rows) ====="
          head -50 signals_debug.csv || true
          echo "===== trades_debug.csv (first 30 rows) ====="
          head -30 trades_debug.csv || true

      - name: Upload verification files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MUSDT-Pine-RAW-Verification
          if-no-files-found: warn
          retention-days: 30
          path: |
            ranking_all.csv
            ranking_best_per_ticker.csv
            parameter_summary.csv
            trades_debug.csv
            signals_debug.csv
