name: M_USDT Pine Verification

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days to scan"
        required: true
        default: "30"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scanner
        run: |
          python -u mexc_scanner_multi_parallel.py \
            --symbols M_USDT \
            --days "${{ github.event.inputs.days }}" \
            --intervals "Min1,Min5" \
            --tp-r-values "5" \
            --max-sl1-roi-values "50" \
            --min-closed-trades "0" \
            --leverage "50" \
            --starting-capital "5" \
            --margin-multiplier "10" \
            --taker-fee "0.0008" \
            --cooldown "0" \
            --max-workers "2" \
            --ranking-all ranking_all.csv \
            --ranking-best ranking_best_per_ticker.csv \
            --parameter-summary parameter_summary.csv \
            --debug-output trades_debug.csv

      - name: Show results
        run: |
          ls -lah
          echo "===== ranking_all.csv ====="
          cat ranking_all.csv || true

          echo "===== ranking_best_per_ticker.csv ====="
          cat ranking_best_per_ticker.csv || true

          echo "===== trades_debug.csv (first 50 rows) ====="
          head -50 trades_debug.csv || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MUSDT-Pine-Verification
          path: |
            ranking_all.csv
            ranking_best_per_ticker.csv
            parameter_summary.csv
            trades_debug.csv
