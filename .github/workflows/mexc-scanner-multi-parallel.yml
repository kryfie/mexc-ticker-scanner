name: MEXC Multi-Parameter Pine Scanner

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days to scan"
        required: true
        default: "30"
      min_max_leverage:
        description: "Minimum contract max leverage"
        required: true
        default: "50"
      min_closed_trades:
        description: "Reject configurations below this closed-trade count"
        required: true
        default: "30"
      leverage:
        description: "Backtest leverage"
        required: true
        default: "50"
      starting_capital:
        description: "Starting capital USDT"
        required: true
        default: "5"
      margin_multiplier:
        description: "Dynamic margin multiplier"
        required: true
        default: "10"
      taker_fee:
        description: "Taker fee per side: 0.0008 = 0.08%"
        required: true
        default: "0.0008"
      cooldown:
        description: "Cooldown in minutes"
        required: true
        default: "0"
      max_workers:
        description: "Parallel ticker+timeframe workers (2 recommended on GitHub)"
        required: true
        default: "2"

  schedule:
    - cron: "0 6 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Resolve scanner settings
        shell: bash
        run: |
          echo "DAYS=${{ github.event.inputs.days || '30' }}" >> "$GITHUB_ENV"
          echo "MIN_MAX_LEVERAGE=${{ github.event.inputs.min_max_leverage || '50' }}" >> "$GITHUB_ENV"
          echo "MIN_CLOSED_TRADES=${{ github.event.inputs.min_closed_trades || '30' }}" >> "$GITHUB_ENV"
          echo "LEVERAGE=${{ github.event.inputs.leverage || '50' }}" >> "$GITHUB_ENV"
          echo "STARTING_CAPITAL=${{ github.event.inputs.starting_capital || '5' }}" >> "$GITHUB_ENV"
          echo "MARGIN_MULTIPLIER=${{ github.event.inputs.margin_multiplier || '10' }}" >> "$GITHUB_ENV"
          echo "TAKER_FEE=${{ github.event.inputs.taker_fee || '0.0008' }}" >> "$GITHUB_ENV"
          echo "COOLDOWN=${{ github.event.inputs.cooldown || '0' }}" >> "$GITHUB_ENV"
          echo "MAX_WORKERS=${{ github.event.inputs.max_workers || '2' }}" >> "$GITHUB_ENV"

      - name: Scan all parameter combinations
        run: |
          python -u mexc_scanner_multi_parallel.py \
            --all \
            --min-max-leverage "$MIN_MAX_LEVERAGE" \
            --days "$DAYS" \
            --intervals "Min1,Min5" \
            --tp-r-values "4,5,6" \
            --max-sl1-roi-values "40,45,50,55,60" \
            --min-closed-trades "$MIN_CLOSED_TRADES" \
            --leverage "$LEVERAGE" \
            --starting-capital "$STARTING_CAPITAL" \
            --margin-multiplier "$MARGIN_MULTIPLIER" \
            --taker-fee "$TAKER_FEE" \
            --cooldown "$COOLDOWN" \
            --max-workers "$MAX_WORKERS" \
            --ranking-all ranking_all.csv \
            --ranking-best ranking_best_per_ticker.csv \
            --parameter-summary parameter_summary.csv \
            --debug-output trades_debug.csv

      - name: Show generated files
        if: always()
        run: |
          ls -lah
          echo "==== ranking_all.csv ===="
          head -31 ranking_all.csv || true
          echo "==== ranking_best_per_ticker.csv ===="
          head -31 ranking_best_per_ticker.csv || true
          echo "==== parameter_summary.csv ===="
          cat parameter_summary.csv || true
          echo "==== trades_debug.csv ===="
          head -20 trades_debug.csv || true

      - name: Upload scanner files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mexc-multi-parameter-scanner-${{ env.DAYS }}d
          if-no-files-found: warn
          retention-days: 30
          path: |
            ranking_all.csv
            ranking_best_per_ticker.csv
            parameter_summary.csv
            trades_debug.csv
