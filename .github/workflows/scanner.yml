name: MEXC Scanner Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Scan all futures x100+
        run: |
         #python -u mexc_scanner.py --all --min-max-leverage 100 --days 7 --output ranking.csv
         python -u mexc_scanner.py --symbols ONDO_USDT MCDSTOCK_USDT XRP_USDT ZRO_USDT --days 7 --output ranking.csv

      - name: Show generated files
        run: |
          ls -lah
          echo "==== ranking.csv ===="
          cat ranking.csv || true
          echo "==== trades_debug.csv (first 20 lines) ===="
          head -20 trades_debug.csv || true

      - name: Upload files
        uses: actions/upload-artifact@v4
        with:
          name: scanner-output
          path: |
            ranking.csv
            trades_debug.csv
